<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Mohit</title>
</head>
<body>
    <h1>Contact Me</h1>
    <p>Feel free to reach out using the form below:</p>
    <form action="mailto:mohitkumar143@gmail.com">
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your name " required><br><br>
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email " required><br><br>
        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number " pattern="[0-9]{10}"><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" cols="30" placeholder="Enter your message " minlength="3"></textarea><br><br>
        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
